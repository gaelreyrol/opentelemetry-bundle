framework:
  secret: ThisIsSecret
  test: true
  fragments: {path: /_fragment}
  mailer:
    transports:
      default: null://null
      exception: smtp://localhost:25
  cache:
    app: cache.adapter.array
    system: cache.adapter.array
  messenger:
    transports:
      main:
        dsn: 'trace(in-memory://default)'
        retry_strategy:
          max_retries: 0
      setup:
        dsn: 'trace(doctrine://app?table_name=messenger_messages_setup_test&auto_setup=false)'
        retry_strategy:
          max_retries: 0
    routing:
      'App\Message\*': main
    buses:
      messenger.bus.default:
        middleware:
          - open_telemetry_tracer
